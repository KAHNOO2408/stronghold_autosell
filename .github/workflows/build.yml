name: Build trade_dll

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution (Release|Win32)
        run: msbuild trade_dll.sln /p:Configuration=Release /p:Platform=Win32

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: trade_dll
          path: Release/trade_dll.dll
